name: Build & Push Images

# Her push'ta (main) üç servisin arm64 imajını build edip GHCR'a gönderir.
# k3s VM'i arm64 (Apple M3) olduğu için native arm64 runner kullanılır.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: muzafferberkesavas

jobs:
  build:
    runs-on: ubuntu-24.04-arm # public repo → ücretsiz native arm64 runner
    permissions:
      contents: read
      packages: write # GHCR'a push için
    strategy:
      matrix:
        include:
          - { name: backend, context: ./backend, image: support-backend, build_args: '' }
          - { name: file-service, context: ./file-service, image: support-file-service, build_args: '' }
          - { name: frontend, context: ./frontend, image: support-frontend, build_args: 'VITE_API_URL=/api' }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/arm64
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # CD: imajlar GHCR'a gidince VM'deki self-hosted runner k3s'i yeni :<sha>
  # imajlarına geçirir (rollout). Runner kümenin içinde olduğu için yerel
  # cluster'a erişir; bulut runner'ları yerel VM'e ulaşamazdı.
  deploy:
    needs: build
    runs-on: [self-hosted, k3s]
    steps:
      - name: k3s rollout (yeni imajlar)
        run: |
          set -e
          SHA=${{ github.sha }}
          REG=ghcr.io/${{ env.OWNER }}
          K="sudo k3s kubectl -n support"
          $K set image deployment/backend       backend=$REG/support-backend:$SHA
          $K set image deployment/worker        worker=$REG/support-backend:$SHA
          $K set image deployment/file-service  file-service=$REG/support-file-service:$SHA
          $K set image deployment/frontend      frontend=$REG/support-frontend:$SHA
          for d in backend worker file-service frontend; do
            $K rollout status deployment/$d --timeout=180s
          done
          echo "✓ k3s güncellendi (sha: $SHA)"
