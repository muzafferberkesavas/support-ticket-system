# PostgreSQL — kalıcı veri (local-path PVC).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: support
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: support
spec:
  replicas: 1
  strategy:
    type: Recreate # tek PVC; eski pod ölmeden yenisi PVC'yi tutmasın
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_USER, valueFrom: { configMapKeyRef: { name: app-config, key: POSTGRES_USER } } }
            - { name: POSTGRES_DB, valueFrom: { configMapKeyRef: { name: app-config, key: POSTGRES_DB } } }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: app-secret, key: POSTGRES_PASSWORD } } }
            # Veriyi alt dizine yaz (mount kökündeki olası lost+found sorununu önler).
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec: { command: [sh, -c, 'pg_isready -U postgres -d support_db'] }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: support
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
