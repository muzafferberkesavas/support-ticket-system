# Gizli olmayan ortam değişkenleri (docker-compose .env karşılığı).
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: support
data:
  NODE_ENV: production
  PORT: '3000'
  # k3s pod ağı IPv4-only; bazı host'lar (api.anthropic.com) önce IPv6 çözülüyor →
  # bağlantı hatası. Node'u IPv4'ü tercih etmeye zorla (LLM çağrıları için kritik).
  NODE_OPTIONS: --dns-result-order=ipv4first
  # Servisler küme içinde servis adıyla haberleşir.
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/support_db
  REDIS_URL: redis://redis:6379
  FILE_SERVICE_URL: http://file-service:4000
  # Tarayıcı ile API aynı origin (ingress /api) → CORS gevşek (origin yansıtılır).
  CORS_ORIGIN: '*'
  APP_URL: http://192.168.64.3
  UPLOAD_DIR: /app/uploads
  MAX_UPLOAD_MB: '10'
  DIGEST_CRON: '0 8 * * *'
  SLA_SWEEP_CRON: '*/2 * * * *'
  # Talep analizi (LLM). ANTHROPIC_API_KEY Secret'tadır (boşsa NLP'ye düşülür).
  ANTHROPIC_MODEL: claude-haiku-4-5
  ANALYSIS_PROVIDER: auto
  WEEKLY_INSIGHTS_CRON: '0 8 * * 1'
  STALE_TICKET_DAYS: '3'
  CSAT_DELAY_MS: '3600000'
  BULLBOARD_PORT: '3001'
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: '587'
  SMTP_SECURE: 'false'
  MAIL_FROM: Destek Merkezi <no-reply@support.local>
  # Postgres konteyneri için
  POSTGRES_USER: postgres
  POSTGRES_DB: support_db
---
# Gizli bilgiler. (Yerel/dev değerleri; gerçek ortamda değiştirin.)
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: support
type: Opaque
stringData:
  JWT_SECRET: super_secret_dev_key_change_me
  ADMIN_EMAIL: admin@support.local
  ADMIN_PASSWORD: Admin123!
  BULLBOARD_USER: admin
  BULLBOARD_PASS: Admin123!
  FILE_SERVICE_TOKEN: ''
  SMTP_USER: ''
  SMTP_PASS: ''
  POSTGRES_PASSWORD: postgres
  # ANTHROPIC_API_KEY bilerek burada YOK — `kubectl apply` her seferinde boşla ezmesin diye.
  # Kümeye dışarıdan enjekte edilir (commit edilmez):
  #   kubectl -n support patch secret app-secret --type merge \
  #     -p '{"stringData":{"ANTHROPIC_API_KEY":"<ANAHTARINIZ>"}}'
  #   kubectl -n support rollout restart deploy/backend deploy/worker
  # Anahtar yoksa analiz otomatik olarak yerel NLP'ye düşer.
