# Frontend — Vue SPA, nginx ile statik sunulur. VITE_API_URL=/api (aynı origin)
# olacak şekilde build edilir; ingress /api'yi backend'e yönlendirir.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: support
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: ghcr.io/muzafferberkesavas/support-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: support
spec:
  selector: { app: frontend }
  ports:
    - { port: 80, targetPort: 80 }
