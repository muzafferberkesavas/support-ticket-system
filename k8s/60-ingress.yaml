# Traefik ile yönlendirme (docker-compose'daki proxy yerine).
#   /api/...          → backend (/api öneki sıyrılır)  · websocket dahil
#   /                 → frontend (SPA)
# k3s traefik'i HTTP'yi 'web' entryPoint'inde (80) dinler.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: support
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: support
  namespace: support
spec:
  entryPoints: [web]
  routes:
    - match: PathPrefix(`/api`)
      kind: Rule
      services:
        - name: backend
          port: 3000
      middlewares:
        - name: strip-api
    - match: PathPrefix(`/`)
      kind: Rule
      services:
        - name: frontend
          port: 80
