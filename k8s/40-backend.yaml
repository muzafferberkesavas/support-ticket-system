# Backend — REST API + Socket.IO. İmaj CMD'si açılışta migrate + seed çalıştırır.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: support
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: support
spec:
  replicas: 1
  strategy:
    type: Recreate # tek uploads PVC (RWO)
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      initContainers:
        # Postgres + Redis hazır olana kadar bekle (migrate hatasını önler).
        - name: wait-deps
          image: busybox:1.36
          command: [sh, -c, 'until nc -z postgres 5432 && nc -z redis 6379; do echo "deps bekleniyor..."; sleep 2; done']
      containers:
        - name: backend
          image: ghcr.io/muzafferberkesavas/support-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef: { name: app-config }
            - secretRef: { name: app-secret }
          volumeMounts:
            - { name: uploads, mountPath: /app/uploads }
          readinessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 3000 }
            initialDelaySeconds: 40
            periodSeconds: 15
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: support
spec:
  selector: { app: backend }
  ports:
    - { port: 3000, targetPort: 3000 }
