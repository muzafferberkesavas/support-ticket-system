# ── HTTPS Reverse Proxy — support.local (self-signed) ──
# Ürünü tek bir HTTPS origin üzerinden yayınlar:
#   /                → frontend (SPA)
#   /api/            → backend REST API (/api öneki sıyrılır)
#   /api/socket.io/  → backend Socket.IO (websocket upgrade)

# 80 → 443 yönlendirme
server {
    listen 80;
    server_name support.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name support.local;

    ssl_certificate     /etc/nginx/certs/support.local.crt;
    ssl_certificate_key /etc/nginx/certs/support.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Ek (attachment) yüklemeleri için gövde limiti.
    client_max_body_size 20m;

    # Socket.IO (websocket) — /api/socket.io/ → backend /socket.io/
    location /api/socket.io/ {
        proxy_pass http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # REST API — /api/ → backend / (öneki sıyır)
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend SPA
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
