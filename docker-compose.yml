services:
  postgres:
    image: postgres:16-alpine
    container_name: support_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: support_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d support_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: support_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: support_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      PORT: ${PORT}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      REDIS_URL: ${REDIS_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SECURE: ${SMTP_SECURE}
      MAIL_FROM: ${MAIL_FROM}
      APP_URL: ${APP_URL}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB}
      DIGEST_CRON: ${DIGEST_CRON}
      FILE_SERVICE_URL: ${FILE_SERVICE_URL}
      FILE_SERVICE_TOKEN: ${FILE_SERVICE_TOKEN}
    volumes:
      - uploads:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      file-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  # Independent background worker (Bull + Redis). Same image as the backend,
  # but runs the worker entrypoint instead of the API. Communicates with the
  # backend purely over Redis (job queue) — no HTTP between them.
  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      REDIS_URL: ${REDIS_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_SECURE: ${SMTP_SECURE}
      MAIL_FROM: ${MAIL_FROM}
      APP_URL: ${APP_URL}
      DIGEST_CRON: ${DIGEST_CRON}
      SLA_SWEEP_CRON: ${SLA_SWEEP_CRON}
      STALE_TICKET_DAYS: ${STALE_TICKET_DAYS}
      CSAT_DELAY_MS: ${CSAT_DELAY_MS}
      BULLBOARD_PORT: ${BULLBOARD_PORT}
      BULLBOARD_USER: ${BULLBOARD_USER}
      BULLBOARD_PASS: ${BULLBOARD_PASS}
      FILE_SERVICE_URL: ${FILE_SERVICE_URL}
      FILE_SERVICE_TOKEN: ${FILE_SERVICE_TOKEN}
    ports:
      - "3001:3001" # Bull Board (queue dashboard)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      file-service:
        condition: service_healthy

  # Dosya üretim mikroservisi — sadece Excel/PDF üretir, VERİTABANI BAĞLANTISI
  # YOKTUR. Backend ve worker bu servise HTTP ile istek atar (port 4000).
  file-service:
    build:
      context: ./file-service
    container_name: support_file_service
    restart: unless-stopped
    environment:
      PORT: "4000"
      FILE_SERVICE_TOKEN: ${FILE_SERVICE_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: support_frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  # HTTPS reverse proxy — ürünü kendi domain'imiz (support.local) üzerinden
  # self-signed sertifika ile yayınlar. /api → backend, /api/socket.io → backend
  # (websocket), / → frontend. 80 portu 443'e yönlendirir.
  proxy:
    image: nginx:alpine
    container_name: support_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  pgdata:
  uploads:
